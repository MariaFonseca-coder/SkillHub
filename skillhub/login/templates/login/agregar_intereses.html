{% extends "login/base.html" %}
{% block title %}Agregar Intereses{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h3>Agregar Intereses</h3>
      </div>
      <div class="card-body">
        <p>Agrega tus intereses (por ejemplo, #programacion, #tecnologia):</p>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
