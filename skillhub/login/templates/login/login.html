{% extends "login/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h3>Login</h3>
      </div>
      <div class="card-body">
        <p>Inicia sesión utilizando tu cuenta de Google:</p>
        <button id="google-login" class="btn btn-danger">Login con Google</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Firebase App (la base) y Firebase Auth -->
<script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-auth.js"></script>
<script>
  // Configuración de Firebase (reemplaza con los datos de tu proyecto)
  var firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_AUTH_DOMAIN",
    projectId: "TU_PROJECT_ID"
    // Agrega aquí el resto de la configuración necesaria
  };
  firebase.initializeApp(firebaseConfig);

  // Manejo del login con Google
  document.getElementById('google-login').addEventListener('click', function() {
    var provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then(function(result) {
        return result.user.getIdToken();
      })
      .then(function(idToken) {
        // Envía el idToken al backend usando una petición POST
        fetch("{% url 'login:login' %}", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": "{{ csrf_token }}"
          },
          body: "id_token=" + idToken
        })
        .then(response => response.json())
        .then(data => {
          if(data.status === "success") {
            // Redirige según el rol
            if(data.role === "admin") {
              window.location.href = "/admin/"; // Panel de administración
            } else {
              window.location.href = "/"; // Página principal
            }
          } else {
            alert("Error en el login: " + data.message);
          }
        });
      })
      .catch(function(error) {
        console.error("Error en la autenticación con Google:", error);
      });
  });
</script>
{% endblock %}
